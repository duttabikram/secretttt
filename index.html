<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Quicksand', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    margin: 0;
    overflow: hidden;
    transition: 1s;
}

.container {
    background: white;
    padding: 50px;
    border-radius: 25px;
    text-align: center;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(-30px);}
    to {opacity:1; transform: translateY(0);}
}

h1 {
    font-family: 'Pacifico', cursive;
    color: #667eea;
    min-height: 100px;
}

img {
    width: 100%;
    border-radius: 20px;
    margin: 20px 0;
}

button {
    padding: 15px 35px;
    border: none;
    border-radius: 50px;
    font-size: 1.2em;
    cursor: pointer;
    margin: 10px;
}

#yesBtn {
    background: #667eea;
    color: white;
}

#noBtn {
    background: #eee;
    position: absolute;
}
</style>
</head>

<body>

<!-- 🎧 SONG -->
<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1 id="text"></h1>

    <img id="image" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

    <div id="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>
</div>

<script>

// ===== 💖 PERSONALIZED DATA =====
const herName = "Tammanah ❤️";

// ===== ELEMENTS =====
const textEl = document.getElementById("text");
const image = document.getElementById("image");

// ===== TYPE EFFECT =====
function typeText(text, speed = 45) {
    return new Promise(resolve => {
        textEl.textContent = "";
        let i = 0;
        function typing() {
            if (i < text.length) {
                textEl.textContent += text.charAt(i);
                i++;
                setTimeout(typing, speed);
            } else resolve();
        }
        typing();
    });
}

function sleep(ms) {
    return new Promise(res => setTimeout(res, ms));
}

// ===== STORY FLOW =====
async function startStory() {

    await typeText(`Hey ${herName}... 💕`);
    await sleep(1500);

    await typeText("In a world full of people...");
    await sleep(2000);

    await typeText("Somehow... I found you ❤️");
    await sleep(2000);

    await typeText("Every time I hear this song... 🎶");
    await sleep(2000);

    await typeText("It reminds me of you...");
    await sleep(2000);

    await typeText("I love the way you smile when you're happy 😊");
    await sleep(2000);

    await typeText("Even when you say 'accha thik ache' like you're mad 😏");
    await sleep(2000);

    await typeText("That moment you sent me Jungkook’s pic...");
    await sleep(2000);

    await typeText("Not because of him...");
    await sleep(1500);

    await typeText("But because it was you ❤️");
    await sleep(2500);

    await typeText("You know... you're learning to heal people 💭");
    await sleep(2000);

    await typeText("Fixing pain... helping them get better...");
    await sleep(2000);

    await typeText("But you did something to me too...");
    await sleep(2000);

    await typeText("Without even trying... you healed me ❤️");
    await sleep(2500);

    await typeText("Moi tumak bhal pau ❤️");
    await sleep(2500);

    await typeText("So... my heart healer...");
    await sleep(2000);

    await typeText("Will you be mine forever? 💖");
}

startStory();

// ===== MUSIC START =====
document.body.addEventListener("click", () => {
    const music = document.getElementById("bgMusic");
    music.volume = 0.5;
    music.play();
}, { once: true });

// ===== NO BUTTON =====
const noBtn = document.getElementById("noBtn");

const noTexts = [
    "Are you sure? 🥺",
    "Think again 💔",
    "Don't do this 😭",
    "Please... 😢"
];

let noCount = 0;

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 300 - 150;
    const y = Math.random() * 200 - 100;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;

    textEl.textContent = noTexts[Math.min(noCount, noTexts.length - 1)];
    noCount++;
});

// ===== YES BUTTON =====
document.getElementById("yesBtn").addEventListener("click", async () => {

    document.body.style.background = "black";
    document.getElementById("buttons").style.display = "none";

    image.src = "https://media.giphy.com/media/3oz8xIsloV7zOmt81G/giphy.gif";

    await typeText("You just made me the happiest person alive ❤️", 40);

    createConfetti();

    await sleep(2000);

   await typeText("Okay fine... Jungkook still first, I’ll take second place 😄❤️", 40);
});

// ===== CONFETTI =====
function createConfetti() {
    for (let i = 0; i < 120; i++) {
        let c = document.createElement("div");
        c.style.position = "fixed";
        c.style.width = "10px";
        c.style.height = "10px";
        c.style.background = "white";
        c.style.top = "-10px";
        c.style.left = Math.random() * 100 + "%";
        document.body.appendChild(c);

        let fall = setInterval(() => {
            c.style.top = parseFloat(c.style.top) + 5 + "px";
            if (parseFloat(c.style.top) > window.innerHeight) {
                clearInterval(fall);
                c.remove();
            }
        }, 20);
    }
}

</script>

</body>
</html>
