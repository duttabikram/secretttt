<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
    overflow:hidden;
}

/* 💖 Floating hearts background */
body::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image: radial-gradient(circle, rgba(255,255,255,0.3) 2px, transparent 2px);
    background-size: 40px 40px;
    animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
}

/* 🌸 Glass Card */
.container {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
    padding:50px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:500px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:scale(0.8);}
    to {opacity:1; transform:scale(1);}
}

h1 {
    font-family:'Pacifico', cursive;
    color:white;
    min-height:120px;
}

/* 📸 Image */
img {
    width:100%;
    border-radius:20px;
    margin:20px 0;
    transition:0.4s;
}

/* 🔘 Buttons */
button {
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:1.1em;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#yesBtn {
    background:#ff4b7d;
    color:white;
    box-shadow:0 5px 20px rgba(255,75,125,0.5);
}

#yesBtn:hover {
    transform:scale(1.1);
}

#noBtn {
    background:white;
    position:absolute;
    color:#333;
}

/* 💥 Crazy animation */
@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(5px,-5px); }
    50% { transform: translate(-5px,5px); }
    75% { transform: translate(5px,5px); }
    100% { transform: translate(0,0); }
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1 id="text"></h1>
    <img id="image" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

    <div id="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😈</button>
    </div>
</div>

<script>

// ===== TEXT EFFECT =====
const textEl = document.getElementById("text");
function typeText(text,speed=40){
    return new Promise(res=>{
        textEl.innerHTML="";
        let i=0;
        function t(){
            if(i<text.length){
                textEl.innerHTML+=text[i];
                i++;
                setTimeout(t,speed);
            } else res();
        }
        t();
    });
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ===== STORY =====
async function start(){
    await typeText("Hey you... 💕");
    await sleep(1500);

    await typeText("Every time I hear this song... 🎶");
    await sleep(2000);

    await typeText("It reminds me of you ❤️");
    await sleep(2000);

    await typeText("And yeah... even Jungkook can't beat you 😏");
    await sleep(2000);

    await typeText("You healed me without even trying 💫");
    await sleep(2500);

    await typeText("Moi tumak bhal pau ❤️");
    await sleep(2500);

    await typeText("Will you be mine? 💖");
}
start();

// ===== MUSIC =====
document.body.addEventListener("click",()=>{
    document.getElementById("bgMusic").play();
},{once:true});

// ===== CRAZY NO BUTTON =====
const noBtn=document.getElementById("noBtn");
let scale=1;

noBtn.addEventListener("mouseover",()=>{
    const x=Math.random()*400-200;
    const y=Math.random()*300-150;

    scale-=0.1;
    if(scale<0.4) scale=0.4;

    noBtn.style.transform=`translate(${x}px,${y}px) scale(${scale}) rotate(${Math.random()*360}deg)`;
    noBtn.style.animation="shake 0.3s";
});

// ===== YES BUTTON =====
document.getElementById("yesBtn").onclick=async ()=>{
    document.getElementById("buttons").style.display="none";

    document.body.style.background="linear-gradient(135deg,#ff758c,#ff7eb3)";

    await typeText("I knew it 😏❤️",40);

    confetti();
};

// ===== CONFETTI =====
function confetti(){
    for(let i=0;i<150;i++){
        let c=document.createElement("div");
        c.style.position="fixed";
        c.style.width="8px";
        c.style.height="8px";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        c.style.left=Math.random()*100+"%";
        c.style.top="-10px";
        document.body.appendChild(c);

        let fall=setInterval(()=>{
            c.style.top=parseFloat(c.style.top)+5+"px";
            if(parseFloat(c.style.top)>window.innerHeight){
                clearInterval(fall);
                c.remove();
            }
        },20);
    }
}

</script>

</body>
</html>
